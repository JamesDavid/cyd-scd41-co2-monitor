; PlatformIO project for the ESP32-2432S028R "CYD" CO2 monitor.
;
; This replaces the Arduino-IDE workflow described in CLAUDE.md / README.md.
; The two manual Arduino-IDE steps are now automated here:
;   1. TFT_eSPI is configured via build_flags below instead of editing the
;      library's User_Setup.h. (The values mirror the block in cyd.md.)
;   2. The partition scheme (1.2 MB app / 1.5 MB SPIFFS) and the LittleFS
;      filesystem are pinned via board_build options.
;
; Build / flash:
;   pio run                 compile
;   pio run -t upload       flash over USB
;   pio device monitor      serial console @115200
;   pio run -t upload -e ota OTA flash (set upload_port to <hostname>.local)
;
; The sketch lives in src/ as a .cpp. It was converted from a single .ino:
; PlatformIO's .ino prototype generator can't handle the two template
; helpers (iterateLog / withChipIdle), so the file carries explicit forward
; declarations instead and is compiled as plain C++.

[platformio]
default_envs = usb

[env]
; Pin to the arduino-esp32 2.0.x toolchain (espressif32 6.9.0). The newer
; arduino-esp32 3.x core produces a ~1.4 MB binary that overflows the
; documented 1.2 MB app partition; 2.0.x stays well under it.
platform = espressif32 @ 6.9.0
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; --- Partitions + filesystem -------------------------------------------------
; Custom 4 MB table (see partitions.csv): 1.5 MB dual-OTA app slots + ~0.94 MB
; LittleFS. The stock default.csv 1.25 MB app slot is too small once the BLE
; (NimBLE) radon feature is included. Dual-OTA is preserved so OTA still works.
board_build.partitions = partitions.csv
board_build.filesystem = littlefs

; --- Libraries ---------------------------------------------------------------
lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
    sensirion/Sensirion I2C SCD4x @ ^1.0.0
    sensirion/Sensirion Core @ ^0.7.1
    https://github.com/tzapu/WiFiManager.git
    ayushsharma82/ElegantOTA @ ^3.1.0
    knolleary/PubSubClient @ ^2.8
    h2zero/NimBLE-Arduino @ ^1.4.2

build_flags =
    ; ---- TFT_eSPI configuration (see cyd.md "TFT_eSPI configuration") ----
    ; Configures the library at compile time so the global User_Setup.h
    ; never has to be touched. If green looks magenta, try ILI9341_DRIVER.
    -D USER_SETUP_LOADED=1
    -D ILI9341_2_DRIVER=1
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BL=21
    -D TFT_BACKLIGHT_ON=HIGH
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT6=1
    -D LOAD_FONT7=1
    -D SMOOTH_FONT=1
    -D SPI_FREQUENCY=55000000
    ; ---- ElegantOTA: use the synchronous WebServer, not AsyncWebServer ----
    ; The sketch passes a plain WebServer to ElegantOTA.begin().
    -D ELEGANTOTA_USE_ASYNC_WEBSERVER=0

; --- USB (default) -----------------------------------------------------------
[env:usb]
; upload_port is auto-detected; uncomment to pin it.
; upload_port = COM5

; --- OTA ---------------------------------------------------------------------
; After the first USB flash, flash over the network. Point upload_port at the
; device's mDNS name (defaults to co2monitor-XXXXXX.local) or its IP.
[env:ota]
upload_protocol = espota
; upload_port = co2monitor.local
